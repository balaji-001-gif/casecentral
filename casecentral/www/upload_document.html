{% extends "templates/web.html" %}

{% block header %}
<link rel="stylesheet" href="/assets/casecentral/css/portal.css">
{% endblock %}

{% block page_content %}
<div class="portal-container">
    <div class="page-header">
        <div>
            <a href="/portal-home" style="text-decoration: none; color: var(--text-muted); font-size: 0.875rem;">← Dashboard</a>
            <h1 style="margin-top: 8px;">Upload Document</h1>
        </div>
    </div>

    {% if no_customer %}
    <div class="glass-card text-center">
        <p>You are not yet linked to a customer account.</p>
    </div>
    {% else %}
    <div class="glass-card" style="max-width: 600px; margin: 0 auto;">
        <div class="form-group">
            <label class="info-label">Upload For</label>
            <select id="doctype-select" class="form-control" onchange="window.location.href='/upload-document?doctype=' + this.value">
                <option value="Case" {% if target_doctype == 'Case' %}selected{% endif %}>Case</option>
                <option value="Matter" {% if target_doctype == 'Matter' %}selected{% endif %}>Matter</option>
                <option value="Customer Appointment" {% if target_doctype == 'Customer Appointment' %}selected{% endif %}>Appointment</option>
            </select>
        </div>

        <div class="form-group">
            <label class="info-label">Select {{ target_doctype }}</label>
            <select id="doc-select" class="form-control">
                <option value="">-- Choose --</option>
                {% for d in docs %}
                <option value="{{ d.name }}" {% if pre_selected_doc == d.name %}selected{% endif %}>
                    {{ d.title }} ({{ d.name }})
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label class="info-label">Document</label>
            <div id="drop-zone" class="drop-zone">
                <p id="file-name-display">Click or drag file here to upload</p>
                <input type="file" id="file-input" style="display: none;">
            </div>
        </div>

        <button id="upload-btn" class="btn-primary" style="width: 100%; padding: 16px; margin-top: 24px;">Upload Document</button>
        <div id="status-msg" style="margin-top: 16px; text-align: center; display: none;"></div>
    </div>
    {% endif %}
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const fileDisplay = document.getElementById('file-name-display');
    const uploadBtn = document.getElementById('upload-btn');
    const statusMsg = document.getElementById('status-msg');
    const docSelect = document.getElementById('doc-select');
    const doctypeSelect = document.getElementById('doctype-select');

    let selectedFile = null;

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--primary)'; });
    dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = '#e2e8f0'; });
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '#e2e8f0';
        if (e.dataTransfer.files.length) {
            selectedFile = e.dataTransfer.files[0];
            fileDisplay.textContent = `Selected: ${selectedFile.name}`;
        }
    });

    fileInput.addEventListener('change', () => {
        if (fileInput.files.length) {
            selectedFile = fileInput.files[0];
            fileDisplay.textContent = `Selected: ${selectedFile.name}`;
        }
    });

    uploadBtn.addEventListener('click', function() {
        if (!selectedFile || !docSelect.value) {
            alert('Please select both a record and a file.');
            return;
        }

        const reader = new FileReader();
        reader.onload = function() {
            const base64 = reader.result.split(',')[1];
            
            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Uploading...';
            statusMsg.style.display = 'block';
            statusMsg.textContent = 'Uploading document, please wait...';
            statusMsg.style.color = 'var(--primary)';

            frappe.call({
                method: 'casecentral.utils.upload_portal_document',
                args: {
                    doctype: doctypeSelect.value,
                    docname: docSelect.value,
                    file_name: selectedFile.name,
                    file_content: base64
                },
                callback: function(r) {
                    uploadBtn.disabled = false;
                    uploadBtn.textContent = 'Upload Document';
                    if (!r.exc) {
                        statusMsg.textContent = 'Successfully uploaded!';
                        statusMsg.style.color = '#10b981';
                        setTimeout(() => {
                            window.location.href = `/portal-home`;
                        }, 1500);
                    }
                }
            });
        };
        reader.readAsDataURL(selectedFile);
    });
</script>
{% endblock %}
